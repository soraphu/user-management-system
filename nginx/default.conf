server {
    listen 80;
    server_name localhost;

    # 1. Point to your custom container path
    root /src/api;

    # 2. Tell Nginx that server.php is the entry point
    index server.php;

    # Logging for your API debugging
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    location / {
        # 3. Redirect all API calls (like /api/users) to server.php
        try_files $uri $uri/ /server.php?$query_string;
    }

    # 4. The PHP Engine Connector
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # Matches the service name in your docker-compose.yml
        fastcgi_pass server:9000; 
        fastcgi_index server.php;
        
        include fastcgi_params;
        
        # 5. This is the "GPS" for the PHP container
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}